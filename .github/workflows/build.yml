name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得您的程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 設定 Java 環境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安裝 Flet 打包工具
        run: pip install flet

      - name: 啟動全自動打包程序 (自動同意安裝 SDK)
        run: yes | flet build apk

      - name: 輸出 APK 檔案
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: build/apk/**/*.apk
